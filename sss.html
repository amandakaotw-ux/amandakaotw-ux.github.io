<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>靈魂逃班</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
html,body{width:100%;height:100dvh;overflow:hidden;font-family:'Noto Sans TC',sans-serif;color:#1a1a2e}

/* ── BACKGROUNDS PER LAYER ── */
#BG{position:fixed;inset:0;z-index:0;transition:background 1.2s}
#BG[data-l="0"]{background:linear-gradient(160deg,#fff5ee 0%,#ffe0cc 50%,#ffd4e8 100%)}
#BG[data-l="1"]{background:linear-gradient(160deg,#eef4ff 0%,#d4e4ff 50%,#c8d4ff 100%)}
#BG[data-l="2"]{background:linear-gradient(160deg,#eefff6 0%,#c8f0d8 50%,#b0e8c0 100%)}
#BG[data-l="3"]{background:linear-gradient(160deg,#fffbe8 0%,#fff0b0 50%,#ffe880 100%)}
#BG[data-l="4"]{background:linear-gradient(160deg,#f8eeff 0%,#e8c8ff 50%,#d8a8ff 100%)}

/* floating blobs */
.blob{position:absolute;border-radius:50%;opacity:.14;animation:blobf ease-in-out infinite alternate}
@keyframes blobf{from{transform:translate(0,0) scale(1)}to{transform:translate(var(--tx,20px),var(--ty,-20px)) scale(1.1)}}

/* ── LAYOUT SCAFFOLD ── */
#TOPBAR{position:fixed;top:0;left:0;right:0;height:58px;z-index:100;
  background:rgba(255,255,255,.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:2px solid rgba(255,255,255,.95);box-shadow:0 2px 16px rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;gap:8px}
.tb-stat{display:flex;flex-direction:column}
.tb-val{font-family:'Fredoka One',cursive;font-size:22px;line-height:1;color:#e17055}
.tb-lbl{font-size:8px;color:#b2bec3;letter-spacing:.12em}
.tb-mid{flex:1;text-align:center}
.tb-title{font-family:'Fredoka One',cursive;font-size:15px;color:#6c5ce7}
.tb-phase{font-size:8px;color:#b2bec3;letter-spacing:.08em;margin-top:1px}
.tb-val-r{color:#00b894;text-align:right}

/* progress under topbar */
#PROG{position:fixed;top:58px;left:0;right:0;height:8px;z-index:100;background:rgba(0,0,0,.07)}
#PROG-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--lc,#a29bfe),var(--lc2,#6c5ce7));
  transition:width .35s cubic-bezier(.22,1,.36,1);box-shadow:0 0 8px rgba(108,92,231,.4)}

/* instruction strip */
#INST{position:fixed;top:66px;left:0;right:0;z-index:100;padding:4px 12px}
.inst-box{background:rgba(255,255,255,.88);border:2px solid rgba(255,255,255,.95);border-radius:10px;
  padding:5px 12px;display:flex;align-items:center;gap:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.07)}
.inst-box.hot{border-color:var(--lc,#e17055);background:rgba(255,230,220,.92)}
.idot{width:6px;height:6px;border-radius:50%;background:var(--lc,#6c5ce7);flex-shrink:0;animation:idot 1s ease infinite}
@keyframes idot{0%,100%{opacity:1}50%{opacity:.2}}
.itext{font-size:10px;color:#636e72;font-weight:700;flex:1}
.itimer{font-family:'Fredoka One',cursive;font-size:18px;color:#e17055}

/* ── ARENA — the game area ── */
#ARENA{position:fixed;top:108px;left:0;right:0;bottom:148px;z-index:10;overflow:hidden}

/* ── PANEL ── */
#PANEL{position:fixed;bottom:0;left:0;right:0;height:148px;z-index:100;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:2px solid rgba(255,255,255,.98);box-shadow:0 -3px 16px rgba(0,0,0,.08);
  padding:8px 12px 18px;display:flex;flex-direction:column;gap:7px}
.ph{display:flex;justify-content:space-between;align-items:center}
.ph h3{font-family:'Fredoka One',cursive;font-size:12px;color:var(--lc,#6c5ce7)}
.ph .eps{font-family:'Fredoka One',cursive;font-size:11px;color:#00b894}
#UPGROW{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
#UPGROW::-webkit-scrollbar{display:none}

/* 3D upgrade card */
.ucard{flex:0 0 auto;width:74px;cursor:pointer;position:relative}
.ucard:active .ucf{transform:translateY(4px)!important;box-shadow:0 0 0 #b8b8cc,0 1px 4px rgba(0,0,0,.08)!important}
.ucf{background:linear-gradient(160deg,#fff,#f2f2fc);border:2px solid #e0e0f0;border-radius:13px;
  padding:7px 5px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 2px 0 #c8c8dc,0 3px 0 #b8b8cc,0 4px 0 #a8a8bc,0 6px 12px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.95);
  transition:box-shadow .1s,transform .1s;position:relative;overflow:hidden}
.ucf::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-15deg);animation:shine 4s ease infinite}
@keyframes shine{0%,78%{left:-60%}82%{left:130%}100%{left:130%}}
.ucard.lit .ucf{background:linear-gradient(160deg,#fff9e0,#ffeab0);border-color:#f0c840;
  box-shadow:0 2px 0 #c0a020,0 3px 0 #b09010,0 4px 0 #a08000,0 6px 14px rgba(240,200,64,.28),inset 0 1px 0 rgba(255,255,255,.95)}
.ucard.maxed .ucf{background:linear-gradient(160deg,#e0fff4,#b0f0d8);border-color:#00b894;
  box-shadow:0 2px 0 #007a60,0 4px 8px rgba(0,184,148,.22),inset 0 1px 0 rgba(255,255,255,.9)}
.uclv{position:absolute;top:3px;right:5px;font-family:'Fredoka One',cursive;font-size:8px;color:#bbb}
.ucard.lit .uclv{color:#b09010}
.ucico{font-size:26px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.12))}
.ucname{font-size:8px;color:#999;text-align:center;line-height:1.2;font-weight:700}
.ucard.lit .ucname{color:#8B6914}
.ucrate{font-size:8px;color:#00b894;font-family:'Fredoka One',cursive}
.uccost{font-family:'Fredoka One',cursive;font-size:11px;color:var(--lc,#6c5ce7)}
.uccost.dim{color:#ccc}

/* ── PAUSE BTN ── */
#PAUSEBTN{position:fixed;bottom:155px;right:12px;z-index:200;
  width:40px;height:40px;background:rgba(255,255,255,.95);border:2px solid #e0e0f0;border-radius:12px;
  font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;color:#6c5ce7;pointer-events:all;
  box-shadow:0 2px 0 #c8c8dc,0 3px 0 #b8b8cc,0 5px 12px rgba(0,0,0,.1);
  transition:transform .1s,box-shadow .1s}
#PAUSEBTN.on{display:flex}
#PAUSEBTN:active{transform:translateY(3px);box-shadow:0 0 0 #c8c8dc,0 2px 4px rgba(0,0,0,.08)}

/* ── INTRO ── */
#INTRO{position:fixed;inset:0;z-index:900;
  background:linear-gradient(160deg,#fff5ee,#ffe0cc 40%,#ffd4e8);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;transition:opacity .5s;text-align:center}
#INTRO.out{opacity:0;pointer-events:none}
.ilogo{font-family:'Fredoka One',cursive;font-size:50px;color:#1a1a2e;
  text-shadow:3px 3px 0 rgba(108,92,231,.2);line-height:1;margin-bottom:4px}
.ilogo em{color:#6c5ce7;font-style:normal;font-size:30px;display:block}
.itag{font-size:9px;color:#b2bec3;letter-spacing:.25em;margin-bottom:14px}
.istory{background:rgba(255,255,255,.72);border:2px solid rgba(255,255,255,.9);border-radius:16px;
  padding:14px 18px;font-size:12px;line-height:2;color:#636e72;max-width:300px;margin-bottom:16px;text-align:left}
.istory strong{color:#1a1a2e}
.ilayers{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px;max-width:300px}
.ilayer{padding:5px 12px;border-radius:99px;font-size:10px;font-family:'Fredoka One',cursive;border:2px solid;display:flex;align-items:center;gap:4px}
.sbtn{background:linear-gradient(145deg,#a29bfe,#6c5ce7);border:none;color:#fff;
  font-family:'Fredoka One',cursive;font-size:20px;letter-spacing:.05em;
  padding:15px 48px;border-radius:16px;cursor:pointer;
  box-shadow:0 3px 0 #4a3ab5,0 5px 0 #3a2aa5,0 7px 20px rgba(108,92,231,.45),inset 0 1px 0 rgba(255,255,255,.4)}
.sbtn:active{transform:translateY(5px);box-shadow:0 0 0 #4a3ab5,0 2px 6px rgba(108,92,231,.25)}

/* ── PAUSE OVERLAY ── */
#PAUSEOV{position:fixed;inset:0;z-index:800;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s}
#PAUSEOV.on{opacity:1;pointer-events:all}
.pov-ico{font-size:52px;margin-bottom:12px;animation:picob 2s ease infinite alternate}
@keyframes picob{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
.pov-title{font-family:'Fredoka One',cursive;font-size:40px;color:#6c5ce7;margin-bottom:4px}
.pov-sub{font-size:9px;color:#b2bec3;letter-spacing:.2em;margin-bottom:20px}
.pov-card{background:#fff;border:2px solid #f0f0fa;border-radius:18px;padding:14px 24px;margin-bottom:18px;min-width:210px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.pov-row{display:flex;justify-content:space-between;gap:20px;margin-bottom:5px}
.pov-row:last-child{margin:0}
.pov-rl{font-size:9px;color:#b2bec3;letter-spacing:.1em}
.pov-rv{font-family:'Fredoka One',cursive;font-size:18px;color:#1a1a2e}
.pov-btns{display:flex;flex-direction:column;gap:10px;align-items:center}
.pov-go{background:linear-gradient(145deg,#a29bfe,#6c5ce7);border:none;color:#fff;
  font-family:'Fredoka One',cursive;font-size:18px;padding:13px 44px;border-radius:14px;cursor:pointer;
  box-shadow:0 3px 0 #4a3ab5,0 5px 14px rgba(108,92,231,.35),inset 0 1px 0 rgba(255,255,255,.3)}
.pov-go:active{transform:translateY(3px);box-shadow:0 0 0 #4a3ab5,0 2px 4px rgba(108,92,231,.2)}
.pov-quit{background:none;border:2px solid #e0e0f0;color:#b2bec3;
  font-family:'Fredoka One',cursive;font-size:13px;padding:8px 24px;border-radius:99px;cursor:pointer}

/* ── LAYER TRANSITION ── */
#LAYERTRANS{position:fixed;inset:0;z-index:700;background:rgba(255,255,255,.96);backdrop-filter:blur(30px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;
  opacity:0;pointer-events:none;transition:opacity .4s;text-align:center}
#LAYERTRANS.on{opacity:1;pointer-events:all}
.lt-badge{font-size:8px;color:#b2bec3;letter-spacing:.3em;margin-bottom:14px}
.lt-ico{font-size:72px;margin-bottom:14px}
.lt-title{font-family:'Fredoka One',cursive;font-size:28px;color:#1a1a2e;margin-bottom:10px}
.lt-title em{color:var(--lc,#6c5ce7);font-style:normal}
.lt-mechbox{background:rgba(108,92,231,.07);border:2px solid var(--lc,#6c5ce7);border-radius:16px;
  padding:14px 18px;margin-bottom:22px;max-width:280px}
.lt-mh{font-family:'Fredoka One',cursive;font-size:14px;color:var(--lc,#6c5ce7);margin-bottom:6px}
.lt-md{font-size:12px;color:#636e72;line-height:1.9;white-space:pre-line}
.lt-btn{background:linear-gradient(145deg,var(--lc2,#a29bfe),var(--lc,#6c5ce7));border:none;color:#fff;
  font-family:'Fredoka One',cursive;font-size:18px;padding:14px 44px;border-radius:14px;cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,.15),0 5px 16px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.3)}
.lt-btn:active{transform:translateY(3px)}

/* ── GACHA SHEET ── */
#GACHAO{position:fixed;inset:0;z-index:600;display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.35);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .25s}
#GACHAO.on{opacity:1;pointer-events:all}
#GACHAS{width:100%;max-width:440px;background:#fff;border-radius:24px 24px 0 0;
  border-top:3px solid var(--lc,#6c5ce7);
  transform:translateY(110%);transition:transform .38s cubic-bezier(.34,1.08,.64,1);
  max-height:84dvh;overflow-y:auto;scrollbar-width:none;box-shadow:0 -8px 40px rgba(0,0,0,.14)}
#GACHAO.on #GACHAS{transform:translateY(0)}
#GACHAS::-webkit-scrollbar{display:none}
.gsh{width:36px;height:4px;background:#e8e8f5;border-radius:99px;margin:12px auto 0}
.ghd{padding:14px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f4f4fc}
.gico{width:64px;height:64px;border-radius:14px;background:var(--lc,#6c5ce7);
  display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;
  box-shadow:0 3px 0 rgba(0,0,0,.14),0 5px 14px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.3);
  transform:scale(.3) rotate(-20deg);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
#GACHAO.on .gico{transform:scale(1) rotate(0)}
.gmeta{flex:1}
.gname{font-family:'Fredoka One',cursive;font-size:19px;color:#1a1a2e}
.glv{font-size:10px;color:#b2bec3;margin-top:3px}
.rbadge{display:inline-block;padding:3px 10px;border-radius:99px;font-family:'Fredoka One',cursive;font-size:10px;margin-top:5px;border:2px solid currentColor}
.rN{color:#b2bec3;background:#f8f8fc}.rR{color:#0984e3;background:#e8f4fd}
.rSR{color:#6c5ce7;background:#f0eeff}
.rSSR{color:#f9ca24;background:#fffde7;animation:ssp 1.2s ease infinite}
@keyframes ssp{0%,100%{box-shadow:0 0 0 0 rgba(249,202,36,.4)}50%{box-shadow:0 0 0 6px rgba(249,202,36,0)}}
.rUR{color:#e17055;background:#fff0ed;animation:urp .8s ease infinite}
@keyframes urp{0%,100%{box-shadow:0 0 0 0 rgba(225,112,85,.4)}50%{box-shadow:0 0 0 8px rgba(225,112,85,0)}}
.gclo{width:28px;height:28px;background:#f5f5fa;border:none;border-radius:8px;font-size:14px;color:#b2bec3;cursor:pointer;flex-shrink:0}
.gclo:active{background:#ffe0e0;color:#e17055}
.gstory{margin:12px 16px 0;background:linear-gradient(135deg,#f8f6ff,#fff0f8);border-radius:14px;padding:13px 15px;border:2px solid #f0eeff;position:relative;overflow:hidden}
.gstory::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lc,#6c5ce7),transparent)}
.gkick{font-size:8px;letter-spacing:.2em;color:var(--lc,#6c5ce7);margin-bottom:5px}
.gttl{font-family:'Fredoka One',cursive;font-size:16px;color:#1a1a2e;margin-bottom:7px}
.gbod{font-size:12px;line-height:2;color:#636e72;white-space:pre-line}
.gbod strong{color:#1a1a2e}
.gchips{margin:10px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.gchip{padding:5px 12px;background:#f5f5fa;border:2px solid #e8e8f5;border-radius:99px;font-size:10px;color:#636e72;display:flex;align-items:center;gap:4px}
.gchip.hot{background:rgba(108,92,231,.07);border-color:var(--lc,#6c5ce7);color:var(--lc,#6c5ce7)}
.gsec{margin:10px 16px 0;padding:11px 14px;border:2px dashed var(--lc,#6c5ce7);border-radius:12px;background:rgba(108,92,231,.04);font-size:11px;color:#636e72;line-height:1.8;display:none}
.gsec.on{display:block}
.gstag{font-size:8px;color:var(--lc,#6c5ce7);letter-spacing:.2em;margin-bottom:4px}
.gms{margin:12px 16px 0;display:flex;align-items:center}
.gmsn{display:flex;flex-direction:column;align-items:center;gap:2px;opacity:.25;transition:opacity .3s}
.gmsn.ok{opacity:1}
.gmsi{font-size:16px}.gmsl{font-size:7px;color:#b2bec3}
.gmsn.ok .gmsl{color:var(--lc,#6c5ce7)}
.gmsline{flex:1;height:2px;background:#f0f0fa;margin:0 4px;margin-bottom:14px;border-radius:99px}
.gmsline.ok{background:var(--lc,#6c5ce7)}
.gcta{margin:14px 16px 28px;display:flex;gap:10px;align-items:center}
.gpr{flex:1}
.gpr .gpl{font-size:8px;color:#b2bec3;letter-spacing:.1em}
.gpr .gpn{font-family:'Fredoka One',cursive;font-size:26px;color:var(--lc,#6c5ce7);line-height:1}
.gpr .gpn.grey{color:#ddd}
.gbuy{background:linear-gradient(145deg,var(--lc2,#a29bfe),var(--lc,#6c5ce7));border:none;color:#fff;
  font-family:'Fredoka One',cursive;font-size:15px;padding:13px 22px;border-radius:12px;cursor:pointer;
  box-shadow:0 2px 0 rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .1s,box-shadow .1s;flex-shrink:0}
.gbuy:active{transform:translateY(2px);box-shadow:0 0 0 rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.1)}
.gbuy.dim{opacity:.35;cursor:default}

/* ── FLOATING LABELS ── */
.flt{position:fixed;pointer-events:none;z-index:500;font-family:'Fredoka One',cursive;
  animation:fltup .9s cubic-bezier(.22,1,.36,1) forwards}
@keyframes fltup{0%{opacity:1;transform:translateY(0) scale(.6)}100%{opacity:0;transform:translateY(-90px) scale(1.1)}}

/* ── POPUP ── */
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);z-index:700;
  background:#fff;border-radius:22px;padding:22px 28px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.14),0 0 0 3px var(--pc,#6c5ce7);
  pointer-events:none;min-width:210px;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  transition:opacity .3s,transform .3s}

/* ─── GAME-SPECIFIC STYLES ─── */
/* L1 Flying cards */
.fcard{position:absolute;border-radius:16px;cursor:pointer;z-index:20;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  border:3px solid rgba(255,255,255,.5);
  box-shadow:0 6px 0 rgba(0,0,0,.1),0 8px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.4)}
.fcard::after{content:'';position:absolute;top:0;left:-60%;width:35%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-15deg);animation:shine 3s ease infinite}
.fcard:active{transform:scale(.91)!important;box-shadow:0 1px 0 rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.07)!important}
.fcard-side{position:absolute;bottom:-8px;left:4px;right:0;height:8px;border-radius:0 0 14px 14px;z-index:-1}
.fcard-tag{position:absolute;top:-8px;right:-6px;background:#ffe000;border:2px solid #fff;border-radius:99px;font-size:8px;font-weight:900;color:#333;padding:2px 6px;box-shadow:0 2px 4px rgba(0,0,0,.15);font-family:'Fredoka One',cursive;white-space:nowrap}

/* L2 Match tiles */
.tile{position:absolute;border-radius:14px;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,.55);
  box-shadow:0 4px 0 rgba(0,0,0,.1),0 6px 16px rgba(0,0,0,.09),inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .1s}
.tile.sel{transform:scale(1.2) translateY(-5px)!important;
  box-shadow:0 8px 0 rgba(0,0,0,.12),0 12px 24px rgba(0,0,0,.14),0 0 0 3px #fff}
.tile.mat{animation:tmat .35s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes tmat{0%{transform:scale(1)}50%{transform:scale(1.4) rotate(12deg)}100%{transform:scale(0);opacity:0}}
.tile.bad{animation:tbad .28s ease}
@keyframes tbad{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}

/* L3 Rhythm */
.rh-zone{position:absolute;border-radius:50%;background:rgba(0,0,0,.05);border:3px dashed rgba(0,0,0,.12)}
.rh-target{position:absolute;border-radius:50%;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;
  border:4px solid rgba(255,255,255,.55);
  box-shadow:0 4px 0 rgba(0,0,0,.12),0 6px 18px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.5);
  animation:rhin .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes rhin{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.rh-ring{position:absolute;border-radius:50%;border:3px solid;pointer-events:none}
.rh-grade{position:absolute;font-family:'Fredoka One',cursive;top:-28px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:13px;pointer-events:none;z-index:30}

/* L4 Dodge */

// ── PARTICLES (canvas-based, drawn on ARENA children) ──
let parts = [];
const PC = document.createElement('canvas');
PC.style.cssText='position:absolute;inset:0;z-index:40;pointer-events:none;width:100%;height:100%';
ARENA.appendChild(PC);
const pctx = PC.getContext('2d');
function resizePC(){ PC.width=ARENA.offsetWidth; PC.height=ARENA.offsetHeight; }

function addP(x,y,col,n=12,sp=5){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=Math.random()*sp+1.5;parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,r:Math.random()*4+2,life:1,dc:.028,col});}
}
function addW(x,y,col,mr=90){ parts.push({x,y,r:5,mr,life:1,dc:.04,type:'w',col}); }
function addE(x,y,em,sp=3){ const a=Math.random()*Math.PI*2; parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,dc:.018,type:'e',em}); }

function renderParts(){
  pctx.clearRect(0,0,PC.width,PC.height);
  parts = parts.filter(p=>{
    p.life -= p.dc; if(p.life<=0) return false;
    pctx.globalAlpha = p.life;
    if(p.type==='w'){ p.r+=(p.mr-p.r)*.15; pctx.strokeStyle=p.col; pctx.lineWidth=2.5; pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2); pctx.stroke(); }
    else if(p.type==='e'){ p.x+=p.vx; p.y+=p.vy; p.vy+=.1; pctx.font='18px serif'; pctx.textAlign='center'; pctx.textBaseline='middle'; pctx.fillText(p.em,p.x,p.y); }
    else{ p.x+=p.vx; p.y+=p.vy; p.vy+=.14; pctx.fillStyle=p.col; pctx.beginPath(); pctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); pctx.fill(); }
    pctx.globalAlpha=1; return true;
  });
}

// ── FMT / FLOAT TEXT / POPUP ──
function fmt(n){ if(n>=1e9)return(n/1e9).toFixed(1)+'B'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return Math.floor(n)+''; }

function flt(x,y,txt,col,sz=16){
  const el=document.createElement('div'); el.className='flt';
  el.style.cssText=`left:${x}px;top:${y}px;font-size:${sz}px;color:${col};text-shadow:1px 1px 0 rgba(0,0,0,.12)`;
  el.textContent=txt; document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}
function showPopup(ico,title,msg,col){
  document.querySelectorAll('._pop').forEach(e=>e.remove());
  const p=document.createElement('div'); p.className='_pop popup';
  p.style.setProperty('--pc',col);
  p.innerHTML=`<div style="font-size:46px;margin-bottom:8px">${ico}</div><div style="font-family:'Fredoka One',cursive;font-size:20px;color:${col};margin-bottom:4px">${title}</div><div style="font-size:11px;color:#636e72">${msg}</div>`;
  document.body.appendChild(p);
  // Force reflow then animate in
  p.getBoundingClientRect();
  p.style.transform='translate(-50%,-50%) scale(1)';
  setTimeout(()=>{
    p.style.opacity='0';
    p.style.transform='translate(-50%,-60%) scale(.9)';
    setTimeout(()=>p.remove(),350);
  },2000);
}

function addEnergy(v){
  G.energy+=v; G.total+=v; layerXP+=v;
  const pct = Math.min(layerXP/bossXPMax,1);
  document.getElementById('PROG-fill').style.width = (pct*100)+'%';

function updateHUD(){

  ()=>{ const v=50+Math.floor(Math.random()*250); G.energy+=v; G.total+=v; return{i:'💰',t:'+'+v+' 自由能量！'}; },
  ()=>{ const i=Math.floor(Math.random()*UPS.length); G.ups[i]++; calcEPS(); buildUpg(); return{i:UPS[i].i,t:'免費升級！'}; },
  ()=>{ const v=Math.floor(eps*60+200); G.energy+=v; G.total+=v; return{i:'⏰',t:'60秒薪水！+'+fmt(v)}; },

const L1_MOVES=[
  ()=>({vy:.28+Math.random()*.18,vx:(Math.random()-.5)*.18,wA:8+Math.random()*14,wS:.024,rV:(Math.random()-.5)*.16,sc:1.05+Math.random()*.25}),
  ()=>({vy:1.5+Math.random()*.9, vx:(Math.random()-.5)*.15,wA:3+Math.random()*6, wS:.05, rV:(Math.random()-.5)*.08,sc:.64+Math.random()*.2}),
  ()=>({vy:.55+Math.random()*.3, vx:(Math.random()-.5)*.5, wA:40+Math.random()*30,wS:.07, rV:(Math.random()-.5)*.7, sc:.85+Math.random()*.2}),
  ()=>({vy:1.9+Math.random()*1.1,vx:(Math.random()-.5)*.8, wA:22+Math.random()*16,wS:.09, rV:(Math.random()-.5)*1.3,sc:.5+Math.random()*.2}),
  ()=>({vy:.18+Math.random()*.12,vx:(Math.random()-.5)*.1, wA:5+Math.random()*7,  wS:.015,rV:(Math.random()-.5)*.06,sc:1.4+Math.random()*.4}),
  ()=>({vy:.65+Math.random()*.4, vx:(Math.random()-.5)*.4, wA:60+Math.random()*35,wS:.1,  rV:(Math.random()-.5)*1.6,sc:.9+Math.random()*.3,pulse:true}),
];
let l1Cards=[], l1SpawnT=0, l1Chaos=0, l1SpawnInt=1.5;

function l1Init(){
  ARENA.querySelectorAll('.fcard').forEach(e=>e.remove());
  l1Cards=[]; l1Chaos=0; l1SpawnT=0;
  setInst('🃏 點擊打爆飛來的辦公室惡夢！逃走了很糟糕！');
}
function l1Spawn(){
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  const roll=Math.random();
  let tp;
  if(roll<.03)      tp=L1_CARDS.find(t=>t.id==='boss');
  else if(roll<.1)  tp=L1_CARDS.find(t=>t.id==='gift');
  else{ const f=L1_CARDS.filter(t=>!['boss','gift'].includes(t.id)); tp=f[Math.floor(Math.random()*f.length)]; }
  const mv=L1_MOVES[Math.floor(Math.random()*L1_MOVES.length)]();
  const sc=mv.sc, w=Math.round(tp.w*sc), h=Math.round(tp.h*sc);
  const x=w/2+Math.random()*(AW-w);
  const fromMid=Math.random()<.2;
  const startY=fromMid?AH*(0.45+Math.random()*.4):AH+h;
  const el=document.createElement('div'); el.className='fcard';
  el.style.cssText=`width:${w}px;height:${h}px;left:${x-w/2}px;top:${startY}px;background:${tp.bg};border-color:${tp.border}`;
  el.innerHTML=`${tp.hint?`<div style="font-size:9px;color:rgba(255,255,255,.85);font-family:'Fredoka One',cursive">${tp.hint}</div>`:``}
    <div style="font-size:${w*.38}px;line-height:1;filter:drop-shadow(0 3px 5px rgba(0,0,0,.18))">${tp.emoji}</div>
    <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.92);text-align:center;line-height:1.2;padding:0 4px">${tp.label}</div>
    <div class="fcard-side" style="background:${tp.side}"></div>`;
  if(fromMid){ el.style.opacity='0'; el.style.transform='scale(.1)'; setTimeout(()=>{ el.style.transition='opacity .28s,transform .3s cubic-bezier(.34,1.56,.64,1)'; el.style.opacity='1'; el.style.transform='scale(1)'; setTimeout(()=>el.style.transition='',340);},20); }
  let alive=true,posX=x,posY=startY,rot=Math.random()*16-8,hp=tp.hp,holdP=0,holdA=false,multiH=0,pulseT=Math.random()*Math.PI*2,wobble=Math.random()*Math.PI*2;

  function die(){
    if(!alive)return; alive=false; el.style.pointerEvents='none';
    const r=el.getBoundingClientRect(), aR=ARENA.getBoundingClientRect();
    const cx=r.left-aR.left+r.width/2, cy=r.top-aR.top+r.height/2;
    addP(cx,cy,tp.border,14,6); addW(cx,cy,tp.border);
    if(tp.id==='gift'){
      const giftFn = GIFTS[Math.floor(Math.random()*GIFTS.length)];
      const res = giftFn();
      showPopup(res.i, '🎁 驚喜！', res.t, LAYERS[currentLayer].lc);
      // also add a base energy for the gift tap
      addEnergy(30 + currentLayer * 10);
    } else {
      flt(r.left+r.width/2, r.top-20, tp.id==='boss' ? 'BOSS倒了！💥' : '+'+Math.floor(tp.val*(1+currentLayer*.12)), tp.border, tp.id==='boss'?22:15);
    }
    const gained=tp.val*(1+currentLayer*.12)*(1+mv.sc*.2);
    if(tp.id!=='gift') addEnergy(gained);
    totalTaps++; updateHUD();
    el.style.transition='transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s';
    el.style.transform=`scale(0) rotate(${rot+200}deg)`; el.style.opacity='0';
    setTimeout(()=>{ el.remove(); l1Cards=l1Cards.filter(c=>c.el!==el); },230);
  }
  if(tp.type==='tap'){
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(!alive||paused)return; hp--; el.style.transform=`scale(1.15) rotate(${rot}deg)`; setTimeout(()=>{ if(alive)el.style.transform=`rotate(${rot}deg)`; },80); if(hp<=0)die(); });
  } else if(tp.type==='hold'){
    const rng=document.createElement('div'); rng.style.cssText='position:absolute;inset:-4px;border:3px solid rgba(255,255,255,.8);border-radius:18px;box-sizing:border-box;pointer-events:none;opacity:0;transition:opacity .1s'; el.appendChild(rng);
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(!paused)holdA=true; });
    el.addEventListener('pointerup',()=>{ holdA=false; });
    el.addEventListener('pointerleave',()=>{ holdA=false; });
  } else if(tp.type==='swipe'){
    let sx=0,sy=0;
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(paused)return; sx=e.clientX; sy=e.clientY; });
    el.addEventListener('pointerup',e=>{ if(paused)return; const dx=e.clientX-sx,dy=e.clientY-sy; if(Math.abs(dx)>26||Math.abs(dy)>26){ el.style.transition='transform .25s,opacity .2s'; el.style.transform=`translateX(${dx*3}px) rotate(${dx>0?35:-35}deg) scale(.1)`; el.style.opacity='0'; setTimeout(die,230); } });
  } else if(tp.type==='multi'){
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(!alive||paused)return; multiH++; flt(e.clientX,e.clientY,`${multiH}/${tp.multiN}`,tp.border,13); el.style.transform=`scale(1.12) rotate(${rot}deg)`; setTimeout(()=>{ if(alive)el.style.transform=`rotate(${rot}deg)`; },80); if(multiH>=tp.multiN)die(); });
  }
  l1Cards.push({ el, update(dt){
    if(!alive||paused)return;
    if(tp.type==='hold'){ const rng2=el.querySelector('div[style*="inset"]'); if(holdA){ holdP+=dt/tp.holdT; if(rng2)rng2.style.opacity='1'; el.style.filter=`brightness(${1+holdP*.5})`; if(holdP>=1)die(); } else{ holdP=Math.max(0,holdP-.7*dt); if(rng2)rng2.style.opacity='0'; el.style.filter=''; } }
    let vyM=mv.vy*(1+currentLayer*.08); if(mv.pulse){ pulseT+=dt*3; vyM=mv.vy*(0.3+Math.abs(Math.sin(pulseT))*1.5); }
    wobble+=mv.wS*60*dt; posX+=Math.sin(wobble)*mv.wA*dt+mv.vx*60*dt; posY-=vyM*60*dt; rot+=mv.rV*60*dt;
    const AW2=ARENA.offsetWidth;
    if(posX<w/2){ posX=w/2; mv.vx=Math.abs(mv.vx); } if(posX>AW2-w/2){ posX=AW2-w/2; mv.vx=-Math.abs(mv.vx); }
    el.style.left=posX-w/2+'px'; el.style.top=posY-h/2+'px'; el.style.transform=`rotate(${rot}deg)`;
    if(posY<-h*2){ alive=false; el.remove(); l1Cards=l1Cards.filter(c=>c.el!==el); l1Chaos=Math.min(100,l1Chaos+(tp.id==='boss'?12:3)); if(l1Chaos>70)setInst('⚠️ 混亂值爆炸！快打！',true); }
  }});
  ARENA.appendChild(el);
}
function l1Update(dt){
  l1SpawnT-=dt;
  if(l1SpawnT<=0){
    const r2=Math.random(); l1SpawnT=r2<.15?.2+Math.random()*.2:r2<.4?.5+Math.random()*.4:r2<.7?l1SpawnInt:l1SpawnInt*1.6+Math.random()*.8;
    l1Spawn();
    if(l1Chaos>50&&Math.random()<.4) setTimeout(l1Spawn,200+Math.random()*200);
    if(Math.random()<.08){ setTimeout(l1Spawn,100); setTimeout(l1Spawn,260); }
  }
  l1Cards.forEach(c=>c.update(dt));
  l1SpawnInt=Math.max(.35,1.5-G.ups.reduce((a,b)=>a+b,0)*.04);
}

// LAYER 2 — MATCH PAIRS
// ═══════════════════════════════════════════════════════════
const L2_SYM=['🧠','👔','📊','⏰','💰','📧','😤','💤','🤡','📋'];
const L2_BG=['#e17055','#6c5ce7','#0984e3','#00b894','#f9ca24','#fd79a8','#a855f7','#00cec9','#e84393','#fdcb6e'];
let l2Tiles=[], l2Sel=null, l2RndT=0, l2Matched=0, l2Pairs=0;
function l2Init(){ ARENA.querySelectorAll('.tile').forEach(e=>e.remove()); l2Tiles=[]; l2Sel=null; l2StartRound(); }
function l2StartRound(){
  ARENA.querySelectorAll('.tile').forEach(e=>e.remove()); l2Tiles=[]; l2Sel=null; l2Matched=0;
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  const cols=5, rows=4, n=cols*rows, pairs=n/2;
  l2Pairs=pairs; l2RndT=28;
  const pool=L2_SYM.slice(0,pairs);
  const seq=[...pool,...pool].sort(()=>Math.random()-.5);
  const tsz=Math.min(Math.floor((AW-60)/cols),Math.floor((AH-110)/rows),68);
  const gx=(AW-tsz*cols)/(cols+1), gy=(AH-50-tsz*rows)/(rows+1);
  seq.forEach((sym,i)=>{
    const c=i%cols, r=Math.floor(i/cols);
    const x=gx+c*(tsz+gx), y=50+gy+r*(tsz+gy);
    const bg=L2_BG[L2_SYM.indexOf(sym)%L2_BG.length];
    const el=document.createElement('div'); el.className='tile';
    el.style.cssText=`width:${tsz}px;height:${tsz}px;left:${x}px;top:${y}px;background:${bg};font-size:${tsz*.5}px`;
    el.textContent=sym; el.dataset.sym=sym;
    el.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(paused)return; l2Tap(el,sym); });
    ARENA.appendChild(el); l2Tiles.push({el,sym,done:false});
  });
}
function l2Tap(el,sym){
  const tile=l2Tiles.find(t=>t.el===el&&!t.done); if(!tile||tile===l2Sel)return;
  el.classList.add('sel');
  if(!l2Sel){ l2Sel=tile; return; }
  const prev=l2Sel; l2Sel=null;
  if(prev.sym===sym){
    tile.el.classList.add('mat'); prev.el.classList.add('mat'); tile.done=prev.done=true;
    const v=Math.floor(30+currentLayer*10); addEnergy(v); totalTaps++;
    const r=el.getBoundingClientRect(),aR=ARENA.getBoundingClientRect();
    addP(r.left-aR.left+el.offsetWidth/2,r.top-aR.top+el.offsetHeight/2,el.style.background,12,5);
    addW(r.left-aR.left+el.offsetWidth/2,r.top-aR.top+el.offsetHeight/2,el.style.background);
    flt(r.left+el.offsetWidth/2,r.top,'配對！+'+v,LAYERS[currentLayer].lc,18);
    setTimeout(()=>{ tile.el.remove(); prev.el.remove(); },340);
    l2Matched++;
    if(l2Matched>=l2Pairs){ setTimeout(()=>{ showPopup('🎉','全配對！',`+${l2Pairs*60} 獎勵！`,LAYERS[currentLayer].lc); addEnergy(l2Pairs*60); updateHUD(); setTimeout(l2StartRound,1800); },400); }
    updateHUD();
  } else {
    el.classList.add('bad'); prev.el.classList.add('bad'); el.classList.remove('sel'); prev.el.classList.remove('sel');
    G.energy=Math.max(0,G.energy-5); updateHUD();
    flt(el.getBoundingClientRect().left+el.offsetWidth/2,el.getBoundingClientRect().top,'錯誤 -5','#e17055',15);
    setTimeout(()=>{ el.classList.remove('bad'); prev.el.classList.remove('bad'); },280);
  }
}
function l2Update(dt){
  l2RndT-=dt;
  const rem=l2Tiles.filter(t=>!t.done).length/2;
  setInst(`🔮 找出配對！剩 ${rem} 對`,l2RndT<8,Math.max(0,Math.ceil(l2RndT)));
  if(l2RndT<=0){ flt(window.innerWidth/2,window.innerHeight/2,'時間到！','#e17055',24); setTimeout(l2StartRound,600); }
}

// LAYER 3 — RHYTHM
// ═══════════════════════════════════════════════════════════
const L3_SYMS=['📊','💼','📋','⏰','📧','📱','💤','😤'];
let l3Beats=[], l3BeatT=0, l3BPM=78, l3Streak=0;
const L3_POS=()=>{ const AW=ARENA.offsetWidth,AH=ARENA.offsetHeight; return [[AW*.25,AH*.35],[AW*.75,AH*.35],[AW*.5,AH*.62],[AW*.2,AH*.7],[AW*.8,AH*.7]]; };
function l3Init(){
  ARENA.querySelectorAll('.rh-zone,.rh-target').forEach(e=>e.remove());
  l3Beats=[]; l3Streak=0; l3BPM=78; l3BeatT=0;
  L3_POS().forEach(([zx,zy])=>{
    const z=document.createElement('div'); z.className='rh-zone';
    z.style.cssText=`width:68px;height:68px;left:${zx-34}px;top:${zy-34}px`;
    ARENA.appendChild(z);
  });
  setInst('🥁 圈圈縮到紅線時點擊！PERFECT = 3倍！');
}
function l3Spawn(){
  const lc=LAYERS[currentLayer].lc;
  const poss=L3_POS();
  const [px,py]=poss[Math.floor(Math.random()*poss.length)];
  const em=L3_SYMS[Math.floor(Math.random()*L3_SYMS.length)];
  const el=document.createElement('div'); el.className='rh-target';
  el.style.cssText=`width:62px;height:62px;left:${px-31}px;top:${py-31}px;background:${lc};font-size:26px`;
  el.textContent=em;
  const ring=document.createElement('div'); ring.className='rh-ring';
  const dur=60/l3BPM;
  ring.style.cssText=`width:96px;height:96px;left:-21px;top:-21px;border-color:${lc};animation:rhin ${dur}s linear reverse`;
  // shrink ring via keyframe
  ring.style.cssText=`width:96px;height:96px;left:-21px;top:-21px;border-color:${lc};transition:width ${dur}s linear,height ${dur}s linear,left ${dur}s linear,top ${dur}s linear`;
  requestAnimationFrame(()=>{ ring.style.width='0px'; ring.style.height='0px'; ring.style.left='31px'; ring.style.top='31px'; });
  el.appendChild(ring);
  let life=dur, elapsed=0, tapped=false;
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation(); if(tapped||paused)return; tapped=true;
    const pct=elapsed/life;
    let grade,val,col;
    if(pct>.72&&pct<.95){ grade='PERFECT!'; val=Math.floor(40+currentLayer*10)*(1+l3Streak*.1); col='#00b894'; l3Streak++; }
    else if(pct>.45&&pct<.98){ grade='GOOD'; val=20; col=LAYERS[currentLayer].lc; l3Streak++; }
    else{ grade='MISS…'; val=-8; col='#e17055'; l3Streak=0; }
    flt(e.clientX,e.clientY,grade+(l3Streak>=3?` ×${l3Streak}`:''),col,grade==='PERFECT!'?20:14);
    if(val>0){ addEnergy(val); totalTaps++; } else G.energy=Math.max(0,G.energy+val);
    const aR=ARENA.getBoundingClientRect();
    addP(px,py,lc,10,4); addW(px,py,lc,75);
    el.style.transition='transform .12s,opacity .12s'; el.style.transform='scale(0)'; el.style.opacity='0';
    setTimeout(()=>{ el.remove(); l3Beats=l3Beats.filter(b=>b.el!==el); },150);
    updateHUD();
    if(l3Streak>=5) setInst(`🔥 ${l3Streak}連擊！FEVER！`,false);
  });
  l3Beats.push({el,life,elapsed:0,tapped:false,update(dt){
    if(tapped||paused)return; elapsed+=dt;
    if(elapsed>=life){ if(!tapped){ flt(px+ARENA.getBoundingClientRect().left,py+ARENA.getBoundingClientRect().top,'MISS…','#e17055',17); l3Streak=0; G.energy=Math.max(0,G.energy-8); updateHUD(); } el.remove(); l3Beats=l3Beats.filter(b=>b.el!==el); }
  }});
  ARENA.appendChild(el);
}
function l3Update(dt){
  const interval=60/l3BPM;
  l3BeatT+=dt; if(l3BeatT>=interval){ l3BeatT=0; l3Spawn(); if(l3BPM>100&&Math.random()<.3)l3Spawn(); }
  l3Beats.forEach(b=>b.update(dt));
  l3BPM=Math.min(160,78+Math.floor(layerXP/bossXPMax*80));
  if(l3Streak<5) setInst(`🥁 ${l3BPM} BPM · ${l3Streak>=3?`🔥${l3Streak}連擊`:'點擊節拍！'}`,l3Streak===0);
}

const L4_BLOCKS=[

let l4Blocks=[], l4Gems=[], l4Player={x:0,y:0,hp:3,maxHp:3};
let l4SpawnT=0, l4GemT=0, l4Iframes=0, l4Score=0;
let l4TouchX=0, l4TouchY=0;
function l4Init(){
  ARENA.querySelectorAll('.dblock,.dgem,#dplayer,.dhp').forEach(e=>e.remove());
  l4Blocks=[]; l4Gems=[]; l4Iframes=0; l4Score=0;
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  l4Player.x=AW/2; l4Player.y=AH-90; l4Player.hp=3;
  l4TouchX=l4Player.x; l4TouchY=l4Player.y;
  const pe=document.createElement('div'); pe.id='dplayer';
  pe.style.left=l4Player.x-25+'px'; pe.style.top=l4Player.y-25+'px';
  pe.textContent='😴'; ARENA.appendChild(pe);
  l4DrawHp();
  setInst('⚡ 拖動控制靈魂！閃避攻擊！收集💎！',false);
  ARENA.addEventListener('pointermove',l4Move);
  ARENA.addEventListener('pointerdown',l4Move);
}
function l4Move(e){ if(paused)return; const r=ARENA.getBoundingClientRect(); l4TouchX=e.clientX-r.left; l4TouchY=e.clientY-r.top; }
function l4DrawHp(){ const old=document.querySelector('.dhp'); if(old)old.remove(); const hp=document.createElement('div'); hp.className='dhp'; hp.textContent='❤️'.repeat(l4Player.hp)+'🖤'.repeat(l4Player.maxHp-l4Player.hp); ARENA.appendChild(hp); }
function l4Update(dt){
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  l4Player.x+=(l4TouchX-l4Player.x)*.14; l4Player.y+=(l4TouchY-l4Player.y)*.14;
  l4Player.x=Math.max(30,Math.min(AW-30,l4Player.x)); l4Player.y=Math.max(70,Math.min(AH-40,l4Player.y));
  const pe=document.getElementById('dplayer');
  if(pe){ pe.style.left=l4Player.x-25+'px'; pe.style.top=l4Player.y-25+'px'; }
  if(l4Iframes>0)l4Iframes-=dt;
  // spawn blocks
  l4SpawnT-=dt;
  if(l4SpawnT<=0){
    l4SpawnT=Math.max(.4,1.2-layerXP/bossXPMax*.7);
    const bt=L4_BLOCKS[Math.floor(Math.random()*L4_BLOCKS.length)];
    const el=document.createElement('div'); el.className='dblock';
    const bx=bt.w/2+Math.random()*(AW-bt.w);
    el.style.cssText=`width:${bt.w}px;height:${bt.h}px;left:${bx-bt.w/2}px;top:${-bt.h}px;background:${bt.bg};border-color:rgba(255,255,255,.35);font-size:22px`; el.textContent=bt.em;
    ARENA.appendChild(el);
    let by=-bt.h, vx=(Math.random()-.5)*.3, vy=bt.sp*(1+currentLayer*.1);
    l4Blocks.push({el,x:bx,y:by,vx,vy,w:bt.w,h:bt.h,alive:true});
  }
  // spawn gems
  l4GemT-=dt;
  if(l4GemT<=0){ l4GemT=3+Math.random()*4;
    const gem=document.createElement('div'); gem.className='dgem';
    gem.style.left=30+Math.random()*(AW-60)+'px'; gem.style.top=70+Math.random()*(AH-160)+'px';
    gem.textContent='💎';
    gem.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(paused)return; const v=Math.floor(20+currentLayer*15); addEnergy(v); totalTaps++; flt(e.clientX,e.clientY,'+'+v,'#00b894',17); addP(parseFloat(gem.style.left),parseFloat(gem.style.top),'#00b894',8,4); gem.remove(); l4Gems=l4Gems.filter(g=>g!==gem); updateHUD(); });
    ARENA.appendChild(gem); l4Gems.push(gem);
    setTimeout(()=>{ gem.style.transition='opacity .4s'; gem.style.opacity='0'; setTimeout(()=>{ gem.remove(); l4Gems=l4Gems.filter(g=>g!==gem); },420); },4000+Math.random()*3000);
  }
  // update blocks + collision
  l4Blocks=l4Blocks.filter(b=>{
    if(!b.alive)return false;
    b.y+=b.vy*60*dt; b.x+=b.vx*60*dt; b.el.style.top=b.y+'px'; b.el.style.left=b.x-b.w/2+'px';
    if(l4Iframes<=0){ const dx=Math.abs(l4Player.x-b.x),dy=Math.abs(l4Player.y-(b.y+b.h/2)); if(dx<b.w/2+18&&dy<b.h/2+18){ l4Player.hp=Math.max(0,l4Player.hp-1); l4Iframes=1.5; l4DrawHp(); flt(l4Player.x+ARENA.getBoundingClientRect().left,l4Player.y+ARENA.getBoundingClientRect().top-20,'💥 HIT！','#e17055',20); addP(l4Player.x,l4Player.y,'#e17055',10,5); if(l4Player.hp===0){ l4Player.hp=3; showPopup('💔','靈魂受傷！','小心點！',LAYERS[currentLayer].lc); setTimeout(l4DrawHp,100); } b.el.remove(); b.alive=false; return false; } }
    if(b.y>AH+b.h){ b.el.remove(); return false; } return true;
  });
  // passive energy
  l4Score+=dt; if(l4Score>=3){ addEnergy(Math.floor(4+currentLayer*2)); l4Score=0; updateHUD(); }
  setInst(`⚡ 閃避！❤️×${l4Player.hp} · 收集💎加分！`,l4Player.hp<=1);
}

// ═══════════════════════════════════════════════════════════
// LAYER 5 — BOSS BATTLE
// ═══════════════════════════════════════════════════════════
let l5Hp=100, l5Phase=0, l5Spots=[], l5AtkT=0, l5PhaseT=0;
const L5_PHASES=[
  {atkInt:3.5,spotN:2,col:'#e17055',desc:'老闆現身！點擊弱點！'},
  {atkInt:2.2,spotN:3,col:'#a855f7',desc:'發怒了！弱點增多！'},
  {atkInt:1.3,spotN:4,col:'#f9ca24',desc:'最終型態！全力爆發！'},
];
function l5Init(){
  ARENA.querySelectorAll('.boss-spr,.wspot,.bhpbar,.awarn,.aring').forEach(e=>e.remove());
  l5Hp=100; l5Phase=0; l5Spots=[]; l5AtkT=0;
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  const boss=document.createElement('div'); boss.className='boss-spr'; boss.id='L5BOSS';
  boss.style.left=AW/2-45+'px'; boss.style.top=AH*.1+'px'; boss.textContent='👔';
  ARENA.appendChild(boss);
  const bar=document.createElement('div'); bar.className='bhpbar'; bar.id='L5HPBAR';
  bar.style.cssText=`left:20px;top:${AH*.06}px;right:20px;`;
  bar.innerHTML='<div class="bhpfill" id="L5HPFILL" style="width:100%"></div>';
  ARENA.appendChild(bar);
  l5MakeSpots();
  setInst('💀 點擊發光弱點！閃避紅色警告！',false);
}
function l5MakeSpots(){
  l5Spots.forEach(s=>s.remove()); l5Spots=[];
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  const ph=L5_PHASES[Math.min(l5Phase,L5_PHASES.length-1)];
  const poss=[[AW*.25,AH*.55],[AW*.75,AH*.55],[AW*.5,AH*.7],[AW*.15,AH*.68],[AW*.85,AH*.68]];
  for(let i=0;i<ph.spotN;i++){
    const [sx,sy]=poss[i]; const s=document.createElement('div'); s.className='wspot';
    s.style.cssText=`width:56px;height:56px;left:${sx-28}px;top:${sy-28}px;background:${ph.col};box-shadow:0 0 20px ${ph.col}88`;
    s.textContent=['💫','⚡','🌟','🎯'][i%4];
    s.addEventListener('pointerdown',e=>{ e.stopPropagation(); if(paused)return;
      l5Hp=Math.max(0,l5Hp-8); totalTaps++;
      document.getElementById('L5HPFILL').style.width=l5Hp+'%';
      const aR=ARENA.getBoundingClientRect();
      addP(sx,sy,ph.col,12,5); addW(sx,sy,ph.col);
      flt(e.clientX,e.clientY,'-8 HP💥',ph.col,17);
      addEnergy(Math.floor(15+currentLayer*5)); updateHUD();
      s.style.transition='transform .12s cubic-bezier(.34,1.56,.64,1)'; s.style.transform='scale(1.3)'; setTimeout(()=>{ s.style.transform='scale(1)'; s.style.transition=''; },160);
      if(l5Hp<=66&&l5Phase===0){ l5Phase=1; flt(window.innerWidth/2,window.innerHeight*.4,'😡 發怒了！','#e17055',24); l5MakeSpots(); }
      if(l5Hp<=33&&l5Phase===1){ l5Phase=2; flt(window.innerWidth/2,window.innerHeight*.4,'💥 最終型態！','#a855f7',26); const b=document.getElementById('L5BOSS'); if(b)b.style.filter='hue-rotate(200deg) brightness(1.4)'; l5MakeSpots(); }
      if(l5Hp<=0){ l5Victory(); }
    });
    ARENA.appendChild(s); l5Spots.push(s);
  }
}
function l5SpawnAtk(){
  const AW=ARENA.offsetWidth, AH=ARENA.offsetHeight;
  const ph=L5_PHASES[Math.min(l5Phase,L5_PHASES.length-1)];
  const n=l5Phase+1;
  for(let i=0;i<n;i++) setTimeout(()=>{
    const w=60+Math.random()*80, h=55+Math.random()*55;
    const x=Math.random()*(AW-w), y=AH*.42+Math.random()*(AH*.45-h);
    const warn=document.createElement('div'); warn.className='awarn';
    warn.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`; ARENA.appendChild(warn);
    setTimeout(()=>{ warn.remove(); const ring=document.createElement('div'); ring.className='aring'; ring.style.cssText=`left:${x+w/2-36}px;top:${y+h/2-36}px;width:72px;height:72px`; ARENA.appendChild(ring); addP(x+w/2,y+h/2,'#e17055',12,6); addW(x+w/2,y+h/2,'#e17055',85); flt(x+w/2+ARENA.getBoundingClientRect().left,y+h/2+ARENA.getBoundingClientRect().top,'💥','#e17055',26); setTimeout(()=>ring.remove(),520); }, (l5Phase===2?700:1000)); },i*320);
}
function l5Victory(){
  l5Spots.forEach(s=>s.remove()); l5Spots=[];
  const b=document.getElementById('L5BOSS'); if(b)b.textContent='😭';
  showPopup('🌅','★ 你自由了！★','成功逃離！離職書已送出！','#a855f7');
  addEnergy(bossXPMax*5); updateHUD();
  for(let k=0;k<16;k++) setTimeout(()=>addE(Math.random()*ARENA.offsetWidth,-10,['🎉','✨','🌟','🎊'][Math.floor(Math.random()*4)],3),k*100);
}
function l5Update(dt){
  l5AtkT-=dt;
  if(l5AtkT<=0){ const ph=L5_PHASES[Math.min(l5Phase,L5_PHASES.length-1)]; l5AtkT=ph.atkInt; l5SpawnAtk(); }
  setInst(`💀 BOSS HP: ${l5Hp}% · 弱點點點點！`,l5Hp<40);
}

// ═══════════════════════════════════════════════════════════
// LAYER MANAGEMENT
// ═══════════════════════════════════════════════════════════
const LINITS=[l1Init,l2Init,l3Init,l4Init,l5Init];
const LUPDS=[l1Update,l2Update,l3Update,l4Update,l5Update];

function advanceLayer(){
  if(currentLayer>=LAYERS.length-1){ showPopup('🌅','全通關！','逃班成功！你贏了！','#a855f7'); return; }
  transitioning=true;
  const next=currentLayer+1; const ly=LAYERS[next];
  document.getElementById('LT_B').textContent=`第${next+1}層 UNLOCKED`;
  document.getElementById('LT_ICO').textContent=ly.face;
  document.getElementById('LT_TIT').innerHTML=`進入<em>${ly.name}</em>`;
  document.getElementById('LT_MH').textContent=ly.mh;
  document.getElementById('LT_MD').textContent=ly.md;
  document.getElementById('LAYERTRANS').style.setProperty('--lc',ly.lc);
  document.getElementById('LAYERTRANS').style.setProperty('--lc2',ly.lc2);
  document.getElementById('LAYERTRANS').classList.add('on');
  for(let k=0;k<14;k++) setTimeout(()=>addE(Math.random()*ARENA.offsetWidth,ARENA.offsetHeight*.5,['🎉','✨','🌟','🎊'][Math.floor(Math.random()*4)],4),k*80);
}
function dismissTransition(){
  document.getElementById('LAYERTRANS').classList.remove('on');
  currentLayer++; G.layer=currentLayer; layerXP=0; bossXPMax=LAYERS[currentLayer].xp;
  setTheme(currentLayer);
  // Clear arena
  ARENA.querySelectorAll(':not(canvas)').forEach(e=>e.remove());
  parts=[];
  resizePC();
  LINITS[currentLayer]();
  setTimeout(()=>transitioning=false,300);
}

// ── GACHA ──
const RARS=[
  {id:'N',label:'N · 普通',color:'#b2bec3',chance:.50},{id:'R',label:'R · 稀有',color:'#0984e3',chance:.28},
  {id:'SR',label:'SR · 超稀有',color:'#6c5ce7',chance:.15},{id:'SSR',label:'SSR · 史詩',color:'#f9ca24',chance:.06},
  {id:'UR',label:'UR ★ 傳說',color:'#e17055',chance:.01},
];
const RMARKS={N:['還行啦','普通普通'],R:['稀有！'],SR:['超棒！老闆要哭了！'],SSR:['史詩！你太強！'],UR:['傳說！！宇宙震動！！']};
function rollRar(lv){ const bon=Math.min(lv*.02,.15); const r=Math.random()-bon; let c=0; for(const ra of RARS){ c+=ra.chance; if(r<c)return ra; } return RARS[0]; }
function openGacha(i){
  _gIdx=i;
  const u=UPS[i],lv=G.ups[i],cost=getCost(i),can=G.energy>=cost;
  const ss=u.story.filter(s=>lv>=s.lv); const s=ss[ss.length-1]||u.story[0];
  const nextS=u.story.find(x=>x.lv>lv);
  const rar=rollRar(lv);
  const gc=document.getElementById('GACHAS'); gc.style.setProperty('--lc',rar.color); gc.style.setProperty('--lc2',LAYERS[currentLayer].lc2);
  document.getElementById('G_ICO').textContent=s.ico; document.getElementById('G_ICO').style.background=rar.color;
  document.getElementById('G_NAME').textContent=u.n;
  document.getElementById('G_LV').textContent=lv?`LEVEL ${lv} → ${lv+1}`:'首次解鎖';
  const rb=document.getElementById('G_RAR'); rb.textContent=rar.label; rb.className=`rbadge r${rar.id}`;
  const ce=document.getElementById('G_COST'); ce.textContent=fmt(cost); ce.className='gpn'+(can?'':' grey');
  const bb=document.getElementById('G_BUY'); bb.textContent=can?'升級 ✦':'能量不足'; bb.className='gbuy'+(can?'':' dim'); bb.style.background=can?rar.color:'#ccc';
  const rmk=RMARKS[rar.id][Math.floor(Math.random()*RMARKS[rar.id].length)];
  document.getElementById('G_BODY').innerHTML=`
    <div class="gstory"><div class="gkick">✦ DREAM LOG · ${s.ttl}</div><div class="gttl">${s.ttl}</div><div class="gbod">${s.body.replace(/\n/g,'<br>')}<br><strong>⚡ ${s.fx}</strong></div></div>
    <div class="gchips"><div class="gchip hot">📈 +${(u.eps*(lv+1)).toFixed(1)}/秒</div><div class="gchip hot">${rar.id} 品質</div><div class="gchip">💬 ${rmk}</div></div>
    ${s.secret?`<div class="gsec on"><div class="gstag">★ 隱藏解鎖</div>${s.secret}</div>`:''}
    <div class="gms">${u.story.map((x,j)=>`<div class="gmsn ${lv>=x.lv?'ok':''}"><div class="gmsi">${x.ico.slice(0,2)}</div><div class="gmsl">LV${x.lv}</div></div>${j<u.story.length-1?`<div class="gmsline ${lv>x.lv?'ok':''}"></div>`:''}`).join('')}<span style="font-size:8px;color:#b2bec3;margin-left:8px;margin-bottom:14px;flex-shrink:0">${nextS?`→LV${nextS.lv}`:'★ MAX'}</span></div>`;
  if(rar.id==='SSR'||rar.id==='UR') for(let k=0;k<15;k++) setTimeout(()=>addE(Math.random()*ARENA.offsetWidth,ARENA.offsetHeight*.5,rar.id==='UR'?'🔥':'⭐',2),k*60);
  document.getElementById('GACHAO').classList.add('on');
}
function closeGacha(e){ if(e&&e.target!==document.getElementById('GACHAO'))return; document.getElementById('GACHAO').classList.remove('on'); _gIdx=-1; }
function gachaBuy(){
  const i=_gIdx; if(i<0)return;
  const cost=getCost(i); if(G.energy<cost)return;
  G.energy-=cost; G.ups[i]++; calcEPS(); updateHUD();
  for(let k=0;k<5;k++) setTimeout(()=>addE(Math.random()*ARENA.offsetWidth,ARENA.offsetHeight*.6,UPS[i].i,4),k*80);
  document.getElementById('GACHAO').classList.remove('on');
  setTimeout(()=>{ buildUpg(); openGacha(i); },290);
}

// ── UPGRADES ──
function getCost(i){ return Math.floor(UPS[i].base*Math.pow(1.22,G.ups[i])); }
function calcEPS(){ eps=UPS.reduce((s,u,i)=>s+u.eps*G.ups[i],0); }
function buildUpg(){
  const row=document.getElementById('UPGROW'); row.innerHTML='';
  UPS.forEach((u,i)=>{
    const cost=getCost(i),can=G.energy>=cost,lv=G.ups[i];
    const c=document.createElement('div'); c.className='ucard'+(can?' lit':'')+(lv>=10?' maxed':'');
    c.innerHTML=`<div class="ucf">${lv?`<div class="uclv">LV${lv}</div>`:''}<div class="ucico">${u.i}</div><div class="ucname">${u.n}</div><div class="ucrate">+${(u.eps*(lv+1)).toFixed(1)}/s</div><div class="uccost${can?'':' dim'}">${fmt(cost)}</div></div>`;
    c.addEventListener('click',()=>openGacha(i)); row.appendChild(c);
  });
}

// ── PAUSE ──
function togglePause(){
  paused=!paused;
  const ov=document.getElementById('PAUSEOV'), btn=document.getElementById('PAUSEBTN');
  if(paused){ ov.classList.add('on'); btn.textContent='▶'; document.getElementById('PV_E').textContent=fmt(G.energy); document.getElementById('PV_EPS').textContent=fmt(eps); document.getElementById('PV_K').textContent=totalTaps; document.getElementById('PV_L').textContent=currentLayer+1; }
  else{ ov.classList.remove('on'); btn.textContent='⏸'; }
}

// ── WIRE UP BUTTONS ──
document.getElementById('STARTBTN').addEventListener('click', boot);
document.getElementById('PAUSEBTN').addEventListener('click', togglePause);
document.getElementById('POV_GO').addEventListener('click', togglePause);
document.getElementById('LT_BTN').addEventListener('click', dismissTransition);
document.getElementById('G_CLO').addEventListener('click', closeGacha);
document.getElementById('G_BUY').addEventListener('click', gachaBuy);
document.getElementById('GACHAO').addEventListener('click', closeGacha);

// ── MAIN LOOP ──
let lastT = 0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, .1); lastT=ts;
  if(!started||paused||transitioning) return;
  G.energy+=eps*dt; G.total+=eps*dt;
  renderParts();
  LUPDS[currentLayer](dt);
  saveT+=dt; if(saveT>5){ save(); saveT=0; }
  updateHUD();
  // rebuild upgrade UI every 2 seconds, not every frame
  upgRebuildT=(upgRebuildT||0)+dt; if(upgRebuildT>2){ buildUpg(); upgRebuildT=0; }
}

// ── BOOT ──
function boot(){
  load();
  currentLayer = G.layer || 0;
  bossXPMax = LAYERS[currentLayer].xp;
  const secs=Math.min((Date.now()-G.last)/1000,3600);
  if(secs>8&&eps>0){ const e=Math.floor(eps*secs); G.energy+=e; G.total+=e; }
  calcEPS(); buildUpg(); setTheme(currentLayer); updateHUD();
  resizePC(); initBlobs();
  LINITS[currentLayer]();
  document.getElementById('INTRO').classList.add('out');
  setTimeout(()=>{ document.getElementById('INTRO').style.display='none'; },600);
  document.getElementById('PAUSEBTN').classList.add('on');
  started=true;
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resizePC);
requestAnimationFrame(ts=>{ lastT=ts; });
</script>

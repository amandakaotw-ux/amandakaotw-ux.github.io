<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020711">
  <title>Cinderella × Uber AI｜Landing Page Preview</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020711}body{display:grid;place-items:center;overflow:hidden;font-family:Arial,"Noto Sans TC",sans-serif}.landing{position:relative;width:min(100vw,175vh);aspect-ratio:7/4;overflow:hidden;background:#07142b}.landing-art{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block}.film-frame{position:absolute;left:28.79%;top:30.37%;width:42.69%;height:45.41%;overflow:hidden;background:#000;box-shadow:0 0 0 2px #06101f,0 12px 38px #0009;isolation:isolate}.scene{position:absolute;inset:0;display:grid;place-items:center;opacity:0;transition:opacity 1.1s ease;background:#000}.scene.active{opacity:1}.scene img{width:100%;height:100%;object-fit:cover;filter:brightness(.88) saturate(.96)}.scene.active img{animation:move 5s ease-out both}.scene:nth-child(even).active img{animation-name:move-alt}.scene::after{content:"";position:absolute;inset:0;background:linear-gradient(#0003,transparent 45%,#000b)}.sparkles{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.35;background-image:radial-gradient(circle,#fff 0 1px,transparent 1.8px),radial-gradient(circle,#9deaff 0 1px,transparent 2px);background-size:93px 93px,137px 137px;animation:drift 4s ease-in-out infinite alternate}.subtitles{position:absolute;z-index:4;left:4%;right:4%;bottom:5%;text-align:center;color:#fff;text-shadow:0 2px 4px #000,0 0 12px #000;pointer-events:none}.subtitles p{margin:.12em 0}.zh{font-size:clamp(8px,1.22vw,21px);font-weight:700;line-height:1.35;letter-spacing:.04em}.en{font:italic clamp(6px,.82vw,14px)/1.35 Georgia,serif;color:#eff7ff}.endcard{position:absolute;inset:0;z-index:5;display:grid;place-content:center;text-align:center;color:#fff;background:radial-gradient(circle at 50% 40%,#17334f,#020611 68%);opacity:0;visibility:hidden;transition:opacity .7s}.endcard.visible{opacity:1;visibility:visible}.endcard strong{font-size:clamp(28px,5.3vw,82px);letter-spacing:-.08em}.endcard p{margin:.25em;font-size:clamp(8px,1.1vw,18px);letter-spacing:.08em}.sound{position:absolute;z-index:10;right:1.7%;top:2.2%;border:1px solid #fff7;border-radius:999px;padding:.45em .8em;background:#061329bb;color:#fff;font-size:clamp(7px,.72vw,12px);cursor:pointer;backdrop-filter:blur(6px)}.play-toggle{position:absolute;z-index:12;right:2.3%;bottom:3.5%;display:grid;place-items:center;width:clamp(25px,3vw,48px);aspect-ratio:1;border:1px solid #fff9;border-radius:50%;background:#061329c9;color:#fff;font-size:clamp(9px,1vw,16px);cursor:pointer;box-shadow:0 4px 14px #0009;backdrop-filter:blur(6px);transition:transform .2s,background .2s}.play-toggle:hover{transform:scale(1.08);background:#12375fcc}.play-toggle:focus-visible{outline:2px solid #fff;outline-offset:2px}
    @keyframes move{from{transform:scale(1.015) translateX(-.5%)}to{transform:scale(1.07) translateX(.7%)}}@keyframes move-alt{from{transform:scale(1.07) translateX(.7%)}to{transform:scale(1.02) translateX(-.7%)}}@keyframes drift{to{transform:translate(2px,-4px);opacity:.48}}
    @media(max-aspect-ratio:7/4){.landing{width:100vw;height:auto}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <main class="landing" aria-label="Cinderella × Uber AI landing page">
    <img class="landing-art" src="assets/cinderella-uber-original.png" alt="Cinderella × Uber AI campaign landing page">
    <section class="film-frame" aria-label="自動循環播放的廣告影片">
      <div id="scenes"></div><div class="sparkles" aria-hidden="true"></div>
      <div class="subtitles" aria-live="polite" aria-atomic="true"><p id="zh" class="zh"></p><p id="en" class="en"></p></div>
      <div id="endcard" class="endcard" aria-hidden="true"><strong>Uber</strong><p>今晚，妳說了算。</p><p>The Night Is Yours.</p></div>
      <button id="playToggle" class="play-toggle" type="button" aria-label="停止影片" title="開始／停止">❚❚</button>
    </section>
    <button id="sound" class="sound" type="button" aria-label="開啟聲音">聲音：關</button>
  </main>
  <audio id="audio" src="assets/uber.mp3" preload="auto" muted></audio>
  <script>
    const scenes=[
      {start:0,end:4.5,image:'scene-01.jpg',zh:'時間晚了？沒問題。',en:'Midnight? Not anymore.'},
      {start:4.5,end:9,image:'scene-02.jpg',zh:'有車坐，何必跑？',en:'Why run… when you can ride?'},
      {start:9,end:13.5,image:'scene-03.jpg',zh:'出發，也可以更聰明。',en:'Magic just got smarter.'},
      {start:13.5,end:18,image:'scene-04.jpg',zh:'輕輕一按，想去哪都可以。',en:'One tap. Endless possibilities.'},
      {start:18,end:22.5,image:'scene-05.jpg',zh:'馬車，就留在童話裡吧。',en:'Goodbye, pumpkin carriage.'},
      {start:22.5,end:27,image:'scene-06.jpg',zh:'今晚，妳說了算。',en:'Tonight is yours.'}
    ];
    const total=30,host=document.querySelector('#scenes'),audio=document.querySelector('#audio'),endcard=document.querySelector('#endcard'),playToggle=document.querySelector('#playToggle');let startedAt=performance.now(),current=0,playing=true,last=-1,frame=0;
    scenes.forEach((s,i)=>{const el=document.createElement('article');el.className='scene';el.innerHTML=`<img src="assets/${s.image}" alt="廣告場景 ${i+1}">`;host.appendChild(el)});
    function render(t){const showEnd=t>=27;const index=showEnd?5:Math.max(0,scenes.findIndex(s=>t>=s.start&&t<s.end));document.querySelectorAll('.scene').forEach((el,i)=>el.classList.toggle('active',i===index));if(index!==last){last=index;document.querySelector('#zh').textContent=scenes[index].zh;document.querySelector('#en').textContent=scenes[index].en}document.querySelector('.subtitles').hidden=showEnd;endcard.classList.toggle('visible',showEnd);endcard.setAttribute('aria-hidden',String(!showEnd))}
    function loop(now){if(!playing)return;current=(now-startedAt)/1000;if(current>=total){startedAt=now;current=0;audio.currentTime=0;audio.play().catch(()=>{})}render(current);frame=requestAnimationFrame(loop)}
    function pauseFilm(){playing=false;cancelAnimationFrame(frame);audio.pause();playToggle.textContent='▶';playToggle.setAttribute('aria-label','開始影片')}
    function playFilm(){playing=true;startedAt=performance.now()-current*1000;if(Number.isFinite(audio.duration))audio.currentTime=Math.min(current,audio.duration);audio.play().catch(()=>{});playToggle.textContent='❚❚';playToggle.setAttribute('aria-label','停止影片');cancelAnimationFrame(frame);frame=requestAnimationFrame(loop)}
    playToggle.addEventListener('click',()=>playing?pauseFilm():playFilm());
    document.querySelector('#sound').addEventListener('click',e=>{audio.muted=!audio.muted;e.currentTarget.textContent=audio.muted?'聲音：關':'聲音：開';e.currentTarget.setAttribute('aria-label',audio.muted?'開啟聲音':'關閉聲音');if(!audio.muted)audio.play().catch(()=>{})});
    audio.play().catch(()=>{});render(0);frame=requestAnimationFrame(loop);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyMart × Jellycat Concept｜綠色小宇宙</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #f8fbf7;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      color: #1f2a2a;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(248, 251, 247, 0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .topbar-inner {
      width: min(1180px, 94vw);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 850;
      letter-spacing: .2px;
    }
    .brand-dot {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #00a05a;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
    }
    .nav {
      display: flex;
      gap: 18px;
      font-size: 14px;
      font-weight: 700;
    }
    .nav a {
      text-decoration: none;
      color: #1f2a2a;
    }
    main {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 24px 0 60px;
    }
    section {
      margin: 28px 0;
    }
    .image-block {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 16px 38px rgba(31, 42, 42, 0.08);
    }
    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      align-items: start;
    }
    .products img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 14px 30px rgba(31, 42, 42, 0.08);
    }
    .footer {
      text-align: center;
      color: #6f7d78;
      font-size: 13px;
      padding-top: 20px;
    }
    @media (max-width: 900px) {
      .nav { display: none; }
      .products { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      main { width: 94vw; padding-top: 16px; }
      section { margin: 18px 0; }
      .products { grid-template-columns: 1fr; gap: 18px; }
      .image-block, .products img { border-radius: 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-dot">FJ</span>
        <span>FamilyMart × Jellycat Concept</span>
      </div>
      <nav class="nav">
        <a href="#hero">首頁</a>
        <a href="#products">商品系列</a>
        <a href="#activity">活動辦法</a>
        <a href="#form">公益捐贈</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="hero">
      <img class="image-block" src="images/01_hero_complete.jpg" alt="FamilyMart × Jellycat 綠色小宇宙首頁主視覺">
    </section>

    <section id="products" class="products">
      <img src="images/02_card_onigiri.jpg" alt="Fami Reborn Onigiri">
      <img src="images/03_card_latte.jpg" alt="Mini Latte Re Cup Charm">
      <img src="images/04_card_oden.jpg" alt="Oden Upcycle Pouch">
      <img src="images/05_card_potato.jpg" alt="Sweet Potato Green Buddy">
    </section>

    <section id="activity">
      <img class="image-block" src="images/06_activity.jpg" alt="活動參與方式">
    </section>

    <section id="form">
      <img class="image-block" src="images/07_form_donation_cta.jpg" alt="活動表單與公益捐贈說明">
    </section>

    <footer class="footer">
      FamilyMart × Jellycat Concept ｜ 把日常，變成更溫柔的循環。
    </footer>
  </main>
</body>
</html>
